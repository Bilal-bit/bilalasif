<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7a5c"/>
      <stop offset="100%" stop-color="#ff5a3d"/>
    </linearGradient>
  </defs>

  <!-- background tile -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- subtle inner highlight -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none"
        stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- BA monogram -->
  <text x="50%" y="56%"
        text-anchor="middle" dominant-baseline="central"
        font-family="'Syne', 'Inter', ui-sans-serif, system-ui, sans-serif"
        font-weight="900" font-size="30" letter-spacing="-1.5"
        fill="#ededed">BA</text>

  <!-- orange accent dot -->
  <circle cx="50" cy="16" r="4" fill="url(#accent)"/>
  <circle cx="50" cy="16" r="6" fill="none"
          stroke="#ff5a3d" stroke-opacity="0.25" stroke-width="1"/>
</svg>
